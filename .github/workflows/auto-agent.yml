name: Auto Agent

on:
  issues:
    types: [opened]

jobs:
  solve-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          ANTHROPIC_MODEL: us.anthropic.claude-sonnet-4-20250514
        run: |
          claude -p "You are working on the repo '${{ github.repository }}'.

          GitHub Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

          Description:
          ${{ github.event.issue.body }}

          Read the codebase, understand the issue, and implement a fix. Keep changes minimal and focused. Commit your changes when done."

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "fix: resolve #${{ github.event.issue.number }} - ${{ github.event.issue.title }}"
          body: |
            Automated fix for #${{ github.event.issue.number }}

            ---
            Generated by Claude Code Agent
          branch: auto/issue-${{ github.event.issue.number }}
          commit-message: "fix: resolve #${{ github.event.issue.number }}"
          delete-branch: true
