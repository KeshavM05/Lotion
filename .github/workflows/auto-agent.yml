name: Auto Agent

on:
  issues:
    types: [labeled]

jobs:
  solve-issue:
    if: contains(github.event.issue.labels.*.name, 'auto') || contains(github.event.issue.labels.*.name, 'auto-merge')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          ANTHROPIC_MODEL: us.anthropic.claude-opus-4-6-v1
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO_NAME: ${{ github.repository }}
        run: |
          PROMPT=$(cat <<'PROMPT_END'
          You are working on the repo "${REPO_NAME}".

          GitHub Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Description:
          ${ISSUE_BODY}

          Instructions:
          1. Read CLAUDE.md for project conventions
          2. Explore the relevant parts of the codebase
          3. Implement the fix/feature described in the issue
          4. Run 'npm run build' to verify no TypeScript errors
          5. Commit your changes with a descriptive message

          Keep changes minimal and focused. Do not modify unrelated files.
          PROMPT_END
          )
          PROMPT=$(echo "$PROMPT" | envsubst)
          claude -p "$PROMPT"

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "fix: resolve #${{ github.event.issue.number }} - ${{ github.event.issue.title }}"
          body: |
            Automated fix for #${{ github.event.issue.number }}

            Closes #${{ github.event.issue.number }}

            ---
            Generated by Claude Code Agent (Opus 4.6)
          branch: auto/issue-${{ github.event.issue.number }}
          commit-message: "fix: resolve #${{ github.event.issue.number }}"
          delete-branch: true

      - name: Auto-merge PR
        if: contains(github.event.issue.labels.*.name, 'auto-merge') && steps.create-pr.outputs.pull-request-number
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on issue if no changes
        if: "!steps.create-pr.outputs.pull-request-number"
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "Agent attempted this issue but couldn't produce a working solution. Manual intervention needed."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
